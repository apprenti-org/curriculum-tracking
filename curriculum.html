<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Development Pipeline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/curriculum.css">
</head>
<body class="curriculum-page">
    <div class="auth-gate" id="auth-gate">
        <div class="auth-box">
            <h2>Curriculum Pipeline</h2>
            <p>Enter password to continue</p>
            <input type="password" class="auth-input" id="auth-input" placeholder="Password" autocomplete="off">
            <button class="auth-btn" id="auth-btn">Sign In</button>
            <div class="auth-error" id="auth-error">Incorrect password</div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <header>
        <div>
            <h1><i class="fa-solid fa-diagram-project" style="color:var(--amber);margin-right:8px;"></i>Curriculum Development Pipeline <span class="version-badge" id="version-badge"></span></h1>
            <p>Track curricula from source standard through LMS deployment</p>
        </div>
        <div class="header-actions">
            <a class="nav-link" href="index.html"><i class="fa-solid fa-book-open"></i> Dashboard</a>
            <a class="nav-link" href="status.html"><i class="fa-solid fa-chart-gantt"></i> Status</a>
            <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme"></button>
        </div>
    </header>
    <div class="construction-banner">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span><strong>Under Construction</strong> — This site is actively being developed. Verify all information before distributing.</span>
    </div>

    <div class="pipeline-layout">
        <!-- Curriculum selector -->
        <div class="curriculum-selector" id="curriculum-selector"></div>

        <!-- Standard info -->
        <div class="standard-block" id="standard-block"></div>

        <!-- Pipeline summary -->
        <div class="pipeline-summary" id="pipeline-summary"></div>

        <!-- Groups with courses -->
        <div class="pipeline-groups" id="pipeline-groups"></div>
    </div>

    <!-- Data bundles (auto-generated — do not edit) -->
    <script src="outlines/outlines.js"></script>
    <script src="courses.js"></script>

    <!-- Shared -->
    <script src="js/theme.js"></script>
    <script src="js/shared/version.js"></script>
    <script src="js/shared/constants.js"></script>
    <script src="js/shared/data-store.js"></script>
    <script src="js/shared/formatters.js"></script>

    <!-- Pipeline -->
    <script src="js/curriculum/pipeline.js"></script>
    <script src="js/curriculum/init.js"></script>
</body>
</html>
